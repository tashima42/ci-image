tools:
  - name: "goreleaser"
    source: "https://github.com/goreleaser/goreleaser"
    version: "v2.15.2"
    download_template: "{{ .Source }}/releases/download/{{ .Version }}/goreleaser_{{ title .OS }}_{{ replace .Arch \"amd64\" \"x86_64\" }}.tar.gz"
    extract: "goreleaser"
    install_tool: "curl"
    checksums:
      linux/amd64: "0ebdbf0353aba566b969dde746cc4e4806f96c27aa2f3971b229a9df7611fedc"
      linux/arm64: "5db66761a98f6693161e49e1a95d28d2673a892ba60cb4a5e16736cafd41c4c9"
    dockerfiles:
      - "all"

  - name: "golangci-lint"
    source: "https://github.com/golangci/golangci-lint"
    version: "v2.11.4"
    download_template: "{{ .Source }}/releases/download/{{ .Version }}/golangci-lint-{{ trimprefix .Version \"v\" }}-{{ .OS }}-{{ .Arch }}.tar.gz"
    extract: "golangci-lint-{{ trimprefix .Version \"v\" }}-{{ .OS }}-{{ .Arch }}/golangci-lint"
    install_tool: "curl"
    checksums:
      linux/amd64: "200c5b7503f67b59a6743ccf32133026c174e272b930ee79aa2aa6f37aca7ef1"
      linux/arm64: "3bcfa2e6f3d32b2bf5cd75eaa876447507025e0303698633f722a05331988db4"
    dockerfiles:
      - "all"

  - name: "govulncheck"
    source: "https://pkg.go.dev/golang.org/x/vuln"
    version: "v1.2.0"
    version_commit: "a8075323febce35764797d66a61fa9e19a8d9797"
    install_template: "golang.org/x/vuln/cmd/govulncheck@{{ .VersionCommit }}"
    install_tool: "go-install"
    dockerfiles:
      - "go1.26"

  - name: "gh"
    source: "https://github.com/cli/cli"
    version: "v2.89.0"
    download_template: "{{ .Source }}/releases/download/{{ .Version }}/gh_{{ trimprefix .Version \"v\" }}_{{ .OS }}_{{ .Arch }}.tar.gz"
    extract: "gh_{{ trimprefix .Version \"v\" }}_{{ .OS }}_{{ .Arch }}/bin/gh"
    install_tool: "curl"
    checksums:
      linux/amd64: "d0422caade520530e76c1c558da47daebaa8e1203d6b7ff10ad7d6faba3490d8"
      linux/arm64: "9e64a623dfc242990aa5d9b3f507111149c4282f66b68eaad1dc79eeb13b9ce5"
    dockerfiles:
      - "all"

  - name: "cosign"
    source: "https://github.com/sigstore/cosign"
    version: "v3.0.6"
    download_template: "{{ .Source }}/releases/download/{{ .Version }}/cosign-{{ .OS }}-{{ .Arch }}"
    install_tool: "curl-bin"
    checksums:
      linux/amd64: "c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74"
      linux/arm64: "bedac92e8c3729864e13d4a17048007cfafa79d5deca993a43a90ffe018ef2b8"
    dockerfiles:
      - "all"
