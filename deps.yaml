universal:
  - name: cosign
    source: sigstore/cosign
    version: v3.0.6
    checksums:
      linux/amd64: "c956e5dfcac53d52bcf058360d579472f0c1d2d9b69f55209e256fe7783f4c74"
      linux/arm64: "bedac92e8c3729864e13d4a17048007cfafa79d5deca993a43a90ffe018ef2b8"
    release:
      download_template: "cosign-{os}-{arch}"

  - name: gh
    source: cli/cli
    version: v2.89.0
    checksums:
      linux/amd64: "d0422caade520530e76c1c558da47daebaa8e1203d6b7ff10ad7d6faba3490d8"
      linux/arm64: "9e64a623dfc242990aa5d9b3f507111149c4282f66b68eaad1dc79eeb13b9ce5"
    release:
      download_template: "gh_{version|trimprefix:v}_{os}_{arch}.tar.gz"
      extract: "gh_{version|trimprefix:v}_{os}_{arch}/bin/gh"
      checksum_template: "gh_{version|trimprefix:v}_checksums.txt"

  - name: helm
    source: "https://get.helm.sh"
    mode: static
    version: v3.20.2
    checksums:
      linux/amd64: "258e830a9e613c8a7a302d6059b4bb3b9758f2f3e1bb8ea0d707ce10a9a72fea"
      linux/arm64: "5ea2d6bc2cda3f8edf985e028809f5a9278f404fb8ab24044de9b7cb9b79a691"
    release:
      download_template: "{source}/helm-{version}-{os}-{arch}.tar.gz"
      extract: "{os}-{arch}/helm"

  - name: helmv4
    source: "https://get.helm.sh"
    mode: static
    version: v4.1.4
    checksums:
      linux/amd64: "70b2c30a19da4db264dfd68c8a3664e05093a361cefd89572ffb36f8abfa3d09"
      linux/arm64: "13d03672be289045d2ff00e4e345d61de1c6f21c1257a45955a30e8ae036d8f1"
    release:
      download_template: "{source}/helm-{version}-{os}-{arch}.tar.gz"
      extract: "{os}-{arch}/helm"

  - name: slsactl
    source: rancherlabs/slsactl
    version: v0.1.30
    checksums:
      linux/amd64: "7ed4750766c135ddcae788d194d7ff59a57c6debdc722fd1e52c06460218f10a"
      linux/arm64: "bbbe66089135c82526677177c080f5ca4911ad1989712596338c5acdae4bb383"
    release:
      download_template: "slsactl_{version|trimprefix:v}_{os}_{arch}.tar.gz"
      extract: "slsactl"

tools:
  - name: golangci-lint
    source: golangci/golangci-lint
    version: v2.11.4
    checksums:
      linux/amd64: "200c5b7503f67b59a6743ccf32133026c174e272b930ee79aa2aa6f37aca7ef1"
      linux/arm64: "3bcfa2e6f3d32b2bf5cd75eaa876447507025e0303698633f722a05331988db4"
    release:
      download_template: "golangci-lint-{version|trimprefix:v}-{os}-{arch}.tar.gz"
      extract: "golangci-lint-{version|trimprefix:v}-{os}-{arch}/golangci-lint"

  - name: goreleaser
    source: goreleaser/goreleaser
    version: v2.15.2
    checksums:
      linux/amd64: "0ebdbf0353aba566b969dde746cc4e4806f96c27aa2f3971b229a9df7611fedc"
      linux/arm64: "5db66761a98f6693161e49e1a95d28d2673a892ba60cb4a5e16736cafd41c4c9"
    release:
      download_template: "goreleaser_{os|title}_{arch|replace:amd64=x86_64}.tar.gz"
      extract: "goreleaser"

  - name: govulncheck
    source: golang/vuln
    version: v1.2.0
    version_commit: a8075323febce35764797d66a61fa9e19a8d9797
    install:
      method: go-install
      package: "golang.org/x/vuln/cmd/govulncheck@{version_commit}"

  # charts-build-scripts is a first-party Rancher tool on the compile-time
  # allowlist. mode: release-checksums means checksums are fetched from the
  # upstream release at generate time; version: latest resolves to the current
  # release tag via the GitHub API. The lock file (deps.lock) records the
  # resolved version and timestamp so CI can detect when it changes.
  - name: charts-build-scripts
    source: rancher/charts-build-scripts
    mode: release-checksums
    version: latest

  - name: ob-charts-tool
    source: rancher/ob-charts-tool
    mode: release-checksums
    version: latest
    release:
      download_template: "ob-charts-tool_{os}_{arch}"
      checksum_template: "ob-charts-tool_{version|trimprefix:v}_checksums.txt"
