name: push and release

on:
  push:
    branches:
      - 'main'
    paths:
      - 'dockerfiles/**'

  workflow_dispatch:

concurrency:
  group: build-rancher-ci-image
  cancel-in-progress: false

permissions:
  contents: read
  id-token: none
  packages: write

env:
  CI_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-ci-image:
    runs-on: ubuntu-latest
    container: registry.suse.com/bci/golang:1.26.2@sha256:5ff371483e4d5782b202a535f9897b7068d7ab6a39ee41fd0fba82fba376a60a
    steps:
      - name: Install needed packages
        shell: bash
        run: |
          zypper -n in docker git-core make

      - name: Configure git
        shell: bash
        run: |
          git config --global safe.directory "$(pwd)"
          git config --global user.name "rancher-security-team[bot]"
          git config --global user.email "202797621+rancher-security-team[bot]@users.noreply.github.com"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login -u "${{ github.actor }}" --password-stdin ghcr.io

      - name: Generate
        shell: bash
        run: make generate

      - name: Verify
        shell: bash
        run: make verify

      - name: Build and push image
        shell: bash
        run: make push NO_CACHE=1 REPO="${CI_IMAGE}"
